name: Deploy CloudDrop to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloud-drop
            git pull https://${{ secrets.GH_TOKEN }}@github.com/TommyClemz1/cloud-drop.git main
            cd backend
            npm install --production
            pm2 restart clouddrop-api
            pm2 save
            echo "Deployment complete at $(date)"
