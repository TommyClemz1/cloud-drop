server {
    listen 80;

    # Serve the React app for all non-API routes
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This line makes React Router work — unknown paths fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ requests to the Node.js backend container
    # "backend" here is the Docker Compose service name — Docker's internal
    # DNS resolves it automatically, no IP address needed
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
